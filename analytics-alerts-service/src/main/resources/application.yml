spring:
  application:
    name: analytics-alerts-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    # See aggregator-service for rationale: shared Supabase DB with
    # portfolio-notification-service means we need our own history table.
    table: analytics_alerts_flyway_history

server:
  port: ${PORT:8094}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

analytics:
  alerts:
    enabled: ${ALERTS_EVAL_ENABLED:true}
    eval-cron: "0 * * * * *"               # every minute on the second mark
    cooldown-default-seconds: 1800        # 30 minutes between repeats per rule+area
  internal-token: ${INTERNAL_API_TOKEN:change-me}
  notification:
    base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8091}
    internal-token: ${NOTIFICATION_INTERNAL_TOKEN:change-me}
    timeout-ms: 5000
