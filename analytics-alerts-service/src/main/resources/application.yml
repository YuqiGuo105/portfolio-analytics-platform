spring:
  application:
    name: analytics-alerts-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    # See aggregator-service for rationale: shared Supabase DB with
    # portfolio-notification-service means we need our own history table.
    table: analytics_alerts_flyway_history

server:
  port: ${PORT:8094}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: analytics-alerts-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

analytics:
  alerts:
    enabled: ${ALERTS_EVAL_ENABLED:true}
    eval-cron: "0 * * * * *"               # every minute on the second mark
    cooldown-default-seconds: 1800        # 30 minutes between repeats per rule+area
  # Fail-closed: no defaults. Missing envs make the app refuse to start
  # rather than accept the string "change-me" as a real credential.
  # Provision via Google Secret Manager in prod.
  internal-token: ${INTERNAL_API_TOKEN}
  notification:
    base-url: ${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8091}
    internal-token: ${NOTIFICATION_INTERNAL_TOKEN}
    timeout-ms: ${ANALYTICS_NOTIFICATION_TIMEOUT_MS:15000}

---
# Prod profile: hide the OpenAPI surface (the InternalTokenFilter now
# also refuses to bypass /v3/api-docs and /swagger-ui, so this is
# defense-in-depth).
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
