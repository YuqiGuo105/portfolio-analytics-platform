# Local dev compose. Three stateless Spring Boot apps; all of Kafka /
# Valkey / Postgres are external (Aiven + Supabase) — drive via .env.
#
# Do NOT bake any Aiven password into this file. Use ${VAR} interpolation
# and require the operator to populate .env from .env.example.

services:
  analytics-enrichment-service:
    build:
      context: .
      dockerfile: analytics-enrichment-service/Dockerfile
    image: analytics-enrichment-service:local
    container_name: analytics-enrichment-service
    ports:
      - "${ENRICHMENT_PORT:-8092}:8092"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - PORT=8092
      - KAFKA_BROKERS=${KAFKA_BROKERS:-}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-SCRAM-SHA-256}
      - KAFKA_TRUSTSTORE_TYPE=${KAFKA_TRUSTSTORE_TYPE:-PEM}
      - KAFKA_CA_CERT=${KAFKA_CA_CERT:-}
      - ANALYTICS_TOPIC_RAW=${ANALYTICS_TOPIC_RAW:-analytics.raw.events}
      - ANALYTICS_TOPIC_ENRICHED=${ANALYTICS_TOPIC_ENRICHED:-analytics.enriched.events}
      - ANALYTICS_TOPIC_DLQ=${ANALYTICS_TOPIC_DLQ:-analytics.events.dlq}
      - VALKEY_URL=${VALKEY_URL:-}
      - ANALYTICS_HMAC_SALT=${ANALYTICS_HMAC_SALT:-}
    restart: unless-stopped

  analytics-aggregator-service:
    build:
      context: .
      dockerfile: analytics-aggregator-service/Dockerfile
    image: analytics-aggregator-service:local
    container_name: analytics-aggregator-service
    ports:
      - "${AGGREGATOR_PORT:-8093}:8093"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - PORT=8093
      - KAFKA_BROKERS=${KAFKA_BROKERS:-}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-SCRAM-SHA-256}
      - KAFKA_TRUSTSTORE_TYPE=${KAFKA_TRUSTSTORE_TYPE:-PEM}
      - KAFKA_CA_CERT=${KAFKA_CA_CERT:-}
      - ANALYTICS_TOPIC_ENRICHED=${ANALYTICS_TOPIC_ENRICHED:-analytics.enriched.events}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5432/postgres}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-postgres}
    restart: unless-stopped

  analytics-alerts-service:
    build:
      context: .
      dockerfile: analytics-alerts-service/Dockerfile
    image: analytics-alerts-service:local
    container_name: analytics-alerts-service
    ports:
      - "${ALERTS_PORT:-8094}:8094"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - PORT=8094
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5432/postgres}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-postgres}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-dev-internal-token}
      - NOTIFICATION_INTERNAL_TOKEN=${NOTIFICATION_INTERNAL_TOKEN:-dev-internal-token}
      - NOTIFICATION_SERVICE_BASE_URL=${NOTIFICATION_SERVICE_BASE_URL:-http://host.docker.internal:8082}
    restart: unless-stopped
