spring:
  application:
    name: analytics-aggregator-service

  data:
    redis:
      url: ${VALKEY_URL:redis://localhost:6379}
      timeout: 2000

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      ssl.truststore.type: ${KAFKA_TRUSTSTORE_TYPE:PEM}
      ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:portfolio-analytics-aggregator}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 100
        session.timeout.ms: 30000
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual
      missing-topics-fatal: false

server:
  port: ${PORT:8093}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

analytics:
  topics:
    raw: ${ANALYTICS_TOPIC_RAW:analytics.raw.events}
    dlq: ${ANALYTICS_TOPIC_DLQ:analytics.events.dlq}
  consumer-enabled: ${ANALYTICS_CONSUMER_ENABLED:true}
  hmac-salt: ${ANALYTICS_HMAC_SALT:change-me-please}
  dedup:
    ttl-seconds: ${ANALYTICS_DEDUP_TTL_SECONDS:86400}
  backfill:
    # When true on startup, BackfillRunner reads from the existing
    # visitor_logs / visitor_clicks tables and replays them through the
    # full enrich → upsert pipeline. Defaults to off so a normal boot
    # never silently re-imports a million rows.
    enabled: ${ANALYTICS_BACKFILL_ENABLED:false}
    site-id: ${ANALYTICS_SITE_ID:yuqi.site}
    batch-size: ${ANALYTICS_BACKFILL_BATCH:500}
