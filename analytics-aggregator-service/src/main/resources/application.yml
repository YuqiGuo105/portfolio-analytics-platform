spring:
  application:
    name: analytics-aggregator-service

  data:
    redis:
      url: ${VALKEY_URL:redis://localhost:6379}
      timeout: 2000

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 1
      connection-timeout: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    # Each analytics service owns its own history table because the Supabase
    # database is shared with portfolio-notification-service (which uses the
    # default public.flyway_schema_history). Without this, the aggregator's V1
    # collides with notification-service's V1 and gets skipped, then V2/V3
    # fail because the table they target was never created.
    table: analytics_aggregator_flyway_history

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      # Truststore is only used when security.protocol=SASL_SSL/SSL. In prod we
      # always inject KAFKA_TRUSTSTORE_TYPE=PEM + KAFKA_CA_CERT via Cloud Run.
      ssl.truststore.type: ${KAFKA_TRUSTSTORE_TYPE:PEM}
      ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:portfolio-analytics-aggregator}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 100
        session.timeout.ms: 30000
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual
      type: batch
      missing-topics-fatal: false

server:
  port: ${PORT:8093}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: analytics-aggregator-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

analytics:
  topics:
    raw: ${ANALYTICS_TOPIC_RAW:analytics.raw.events}
    dlq: ${ANALYTICS_TOPIC_DLQ:analytics.events.dlq}
  consumer-enabled: ${ANALYTICS_CONSUMER_ENABLED:true}
  # Fail-closed: no default. If ANALYTICS_HMAC_SALT is unset the app will
  # refuse to start (Spring can't resolve the placeholder) instead of
  # shipping a well-known salt that would let anyone reverse the visitor
  # IP hash. Provision this via Google Secret Manager in prod.
  hmac-salt: ${ANALYTICS_HMAC_SALT}
  # Per-IP fixed-window rate limit for the public /api/public/* surface
  # (see IpRateLimitFilter). Valkey-backed so limits are shared across
  # replicas; falls open on Valkey errors.
  public:
    min-bucket-count: ${ANALYTICS_PUBLIC_MIN_BUCKET_COUNT:5}
    rate-limit:
      enabled: ${PUBLIC_RATE_LIMIT_ENABLED:true}
      max-per-window: ${PUBLIC_RATE_LIMIT_MAX:120}
      window-seconds: ${PUBLIC_RATE_LIMIT_WINDOW_S:60}
    cache:
      enabled: ${PUBLIC_CACHE_ENABLED:true}
      ttl-seconds: ${PUBLIC_CACHE_TTL_SECONDS:30}
  dedup:
    ttl-seconds: ${ANALYTICS_DEDUP_TTL_SECONDS:86400}
    throttle-seconds: ${ANALYTICS_THROTTLE_SECONDS:300}
  funnel:
    # Ordered business events. URL paths are dimensions, never funnel definitions.
    steps: ${ANALYTICS_FUNNEL_STEPS:content_open,read_progress,subscribe_started,subscribe_verified}
  backfill:
    # When true on startup, BackfillRunner reads from the existing
    # visitor_logs / visitor_clicks tables and replays them through the
    # full enrich → upsert pipeline. Defaults to off so a normal boot
    # never silently re-imports a million rows.
    enabled: ${ANALYTICS_BACKFILL_ENABLED:false}
    site-id: ${ANALYTICS_SITE_ID:yuqi.site}
    batch-size: ${ANALYTICS_BACKFILL_BATCH:500}
  retention:
    enabled: ${ANALYTICS_RETENTION_ENABLED:true}
    five-min-retain-days: ${ANALYTICS_RETENTION_5M_DAYS:3}
    raw-retain-days: ${ANALYTICS_RAW_RETENTION_DAYS:30}
    batch-size: ${ANALYTICS_RETENTION_BATCH:2000}
    max-per-run: ${ANALYTICS_RETENTION_MAX:50000}

---
# Prod profile: hide the OpenAPI surface. Anyone who happens to hit the
# Cloud Run URL should NOT be able to enumerate the aggregator API shape.
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
