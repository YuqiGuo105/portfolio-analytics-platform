spring:
  application:
    name: analytics-enrichment-service

  # Aiven Valkey is Redis-protocol compatible. The Lettuce client picks up
  # rediss:// for TLS automatically.
  data:
    redis:
      url: ${VALKEY_URL:redis://localhost:6379}
      timeout: 2000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      ssl.truststore.type: ${KAFKA_TRUSTSTORE_TYPE:PEM}
      ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:portfolio-analytics-enrichment}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: 50
        session.timeout.ms: 30000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 5
    listener:
      ack-mode: manual
      missing-topics-fatal: false

server:
  port: ${PORT:8092}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

analytics:
  topics:
    raw: ${ANALYTICS_TOPIC_RAW:analytics.raw.events}
    enriched: ${ANALYTICS_TOPIC_ENRICHED:analytics.enriched.events}
    dlq: ${ANALYTICS_TOPIC_DLQ:analytics.events.dlq}
  consumer-enabled: ${ANALYTICS_CONSUMER_ENABLED:true}
  hmac-salt: ${ANALYTICS_HMAC_SALT:dev-only-do-not-use-in-prod}
  dedup:
    ttl-seconds: 86400
