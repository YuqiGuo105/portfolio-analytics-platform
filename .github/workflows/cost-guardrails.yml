name: Cloud Run cost guardrails

on:
  schedule:
    - cron: "17 14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Audit only, or apply the approved cost policy"
        required: true
        default: audit
        type: choice
        options:
          - audit
          - apply

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: portfolio-notify-prod
  REGION: us-central1
  AGENT_DAILY_BUDGET_USD: ${{ vars.PORTFOLIO_AGENT_DAILY_BUDGET_USD || '0.75' }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  DEPLOYER_SA_EMAIL: ${{ vars.DEPLOYER_SA_EMAIL }}

jobs:
  enforce:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Audit or apply cost policy
        env:
          MODE: ${{ github.event.inputs.mode || 'audit' }}
        run: ./ops/cloud-run-cost-guardrails.sh "${MODE}"
